; WiFi Network Diagnostics — ESP32E + 4" 320x480 TFT
;
; PIN CONFIGURATION: If the display stays blank, you likely need to
; change the pin mapping below.

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/tty.wchusbserial1132440
monitor_port = /dev/tty.wchusbserial1132440
board_build.partitions = huge_app.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

build_flags =
    ; ── Display driver ──────────────────────────────────
    -DUSER_SETUP_LOADED=1
    -DILI9488_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480

    ; ── PIN CONFIG A — HSPI (confirmed working) ────────
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DUSE_HSPI_PORT

    ; ── Backlight ───────────────────────────────────────
    -DTFT_BL=27
    -DTFT_BACKLIGHT_ON=HIGH

    ; ── Touch (XPT2046 resistive) ──────────────────────
    -DTOUCH_CS=33

    ; ── SPI speeds ──────────────────────────────────────
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000

    ; ── Fonts ───────────────────────────────────────────
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

; ── Native test environment ─────────────────────────────
; Runs parser and OUI unit tests on host machine.
; Usage: pio test -e native
[env:native]
platform = native
build_src_filter = -<*>
lib_deps =
    throwtheswitch/Unity@^2.6
test_framework = unity
